<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Downloader</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      text-align: center;
      padding: 50px;
    }

    .container {
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 15px 0;
      border: none;
      border-radius: 8px;
    }

    button {
      padding: 12px 25px;
      background: #00ffcc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00ccaa;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎬 Video Downloader</h1>
    <p>Paste your video link below</p>

    <input type="text" id="link" placeholder="Enter TikTok / YouTube URL">
    <br>
    <button onclick="download()">Download</button>

    <p id="result"></p>
  </div>

  <script>
    function download() {
      let link = document.getElementById("link").value;

      if (!link) {
        document.getElementById("result").innerText = "⚠️ Please enter a link";
        return;
      }

      document.getElementById("result").innerText =
        "⏳ Processing... real download coming soon";
    }
  </script>

</body>
</html>
