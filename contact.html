<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Video Downloader</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
        .container{max-width:800px;margin:0 auto;background:white;padding:30px;border-radius:15px}
        h1{color:#333;margin-bottom:20px}
        p{color:#666;margin-bottom:20px}
        nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .logo{font-size:24px;font-weight:bold;color:#667eea}
        .nav-links{display:flex;gap:20px}
        .nav-links a{text-decoration:none;color:#333}
        .nav-links a.active{color:#667eea;font-weight:bold}
        input,textarea{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:5px}
        button{background:#667eea;color:white;padding:12px 30px;border:none;border-radius:5px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">📥 VideoDown</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="privacy.html">Privacy</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
        </nav>
        
        <h1>Contact Us</h1>
        <p>Have questions or suggestions? We'd love to hear from you!</p>
        
        <form onsubmit="event.preventDefault();alert('Message sent!');this.reset();">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
        
        <p style="margin-top:30px"><strong>Email:</strong> support@videodownloader.com</p>
    </div>
</body>
</html>
